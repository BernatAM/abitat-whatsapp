services:
  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_KEY: "${SUPABASE_KEY:-}"
      DATABASE_URL: "${DATABASE_URL:-}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN:-change-me}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_GRAPH_VERSION: "${WHATSAPP_GRAPH_VERSION:-v23.0}"
